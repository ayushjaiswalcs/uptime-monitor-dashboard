<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Uptime">
  <title>Uptime Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body>
  <div id="app">
    <header>
      <div id="summary-banner" class="banner banner--loading" aria-live="polite">
        <span id="summary-icon">⏳</span>
        <span id="summary-text">Loading…</span>
      </div>
      <div id="meta-bar">
        <span id="last-updated">—</span>
        <button id="refresh-btn" aria-label="Refresh now" title="Refresh now">↻</button>
      </div>
    </header>

    <main id="cards" aria-label="Endpoint status cards"></main>

    <div id="error-state" class="error-state hidden" role="alert">
      <div class="error-icon">⚠️</div>
      <p class="error-title">Can't reach status data</p>
      <p class="error-sub">The status feed is unreachable or not yet published.<br>Retrying in 30 s…</p>
      <button id="error-retry-btn" class="retry-btn">Try now</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Register service worker relative to this page (works on GitHub Pages subpaths)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .catch(e => console.warn('SW registration failed:', e));
    }
  </script>
</body>
</html>
